<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Droplet Setup Tutorial</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface-2: #232734;
        --border: #2e3345;
        --text: #e1e4ed;
        --text-muted: #8b90a0;
        --accent: #6c8cff;
        --accent-dim: #3a4a80;
        --green: #4ade80;
        --orange: #fb923c;
        --red: #f87171;
        --code-bg: #141620;
        --input-bg: #1e2235;
        --input-border: #6c8cff;
        --radius: 8px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        min-height: 100vh;
      }

      /* Header */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        z-index: 100;
        padding: 16px 24px 0;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .header h1 {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }

      .step-counter {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 500;
      }

      .progress-bar-track {
        width: 100%;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      /* Content */
      .content {
        max-width: 780px;
        margin: 0 auto;
        padding: 100px 24px 100px;
      }

      .step-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text);
      }

      .step-where {
        display: inline-block;
        font-size: 13px;
        font-weight: 500;
        color: var(--accent);
        background: rgba(108, 140, 255, 0.1);
        padding: 4px 12px;
        border-radius: 20px;
        margin-bottom: 20px;
      }

      .step-body p {
        margin-bottom: 14px;
      }

      .step-body ol,
      .step-body ul {
        margin-bottom: 14px;
        padding-left: 24px;
      }

      .step-body li {
        margin-bottom: 8px;
      }

      .step-body strong {
        color: #fff;
      }

      .step-body h3 {
        font-size: 17px;
        font-weight: 600;
        margin: 28px 0 12px;
        color: var(--text);
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      /* Code blocks */
      .code-block {
        position: relative;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin: 14px 0 18px;
        overflow: hidden;
      }

      .code-block-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 12px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-muted);
      }

      .copy-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        padding: 3px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s;
      }

      .copy-btn:hover {
        background: var(--surface);
        color: var(--text);
        border-color: var(--text-muted);
      }

      .copy-btn.copied {
        color: var(--green);
        border-color: var(--green);
      }

      .code-block pre {
        padding: 14px 16px;
        overflow-x: auto;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 13.5px;
        line-height: 1.6;
        color: #c9d1d9;
      }

      /* Inline code */
      .step-body code:not(pre code) {
        background: var(--surface-2);
        padding: 2px 7px;
        border-radius: 4px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
        color: var(--accent);
      }

      /* Interpolated values */
      .val {
        color: var(--green);
        font-weight: 600;
      }

      .val.empty {
        color: var(--orange);
        font-style: italic;
      }

      /* Input fields */
      .input-group {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        margin: 16px 0;
      }

      .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }

      .input-group input {
        width: 100%;
        padding: 10px 14px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 15px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        outline: none;
        transition: border-color 0.15s;
      }

      .input-group input:focus {
        border-color: var(--input-border);
      }

      .input-group input::placeholder {
        color: var(--text-muted);
        opacity: 0.5;
      }

      .input-group .input-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* Tables */
      .step-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0 18px;
        font-size: 14px;
      }

      .step-body th {
        background: var(--surface-2);
        padding: 10px 14px;
        text-align: left;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        border-bottom: 1px solid var(--border);
      }

      .step-body td {
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
      }

      .step-body tr:last-child td {
        border-bottom: none;
      }

      .step-body .table-wrap {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      /* Warning / info boxes */
      .callout {
        border-radius: var(--radius);
        padding: 14px 18px;
        margin: 14px 0;
        font-size: 14px;
        line-height: 1.6;
      }

      .callout.warning {
        background: rgba(251, 146, 60, 0.08);
        border: 1px solid rgba(251, 146, 60, 0.25);
        color: var(--orange);
      }

      .callout.info {
        background: rgba(108, 140, 255, 0.08);
        border: 1px solid rgba(108, 140, 255, 0.25);
        color: var(--accent);
      }

      .callout.success {
        background: rgba(74, 222, 128, 0.08);
        border: 1px solid rgba(74, 222, 128, 0.25);
        color: var(--green);
      }

      /* Footer */
      .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 14px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
      }

      .nav-btn {
        padding: 10px 28px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        border: none;
      }

      .nav-btn.prev {
        background: var(--surface-2);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .nav-btn.prev:hover {
        background: var(--border);
      }

      .nav-btn.prev:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .nav-btn.next {
        background: var(--accent);
        color: #fff;
      }

      .nav-btn.next:hover {
        background: #5a7ae6;
      }

      /* Step dots */
      .step-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .step-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        cursor: pointer;
        transition: all 0.15s;
      }

      .step-dot.active {
        background: var(--accent);
        width: 24px;
        border-radius: 4px;
      }

      .step-dot.completed {
        background: var(--green);
      }

      .step-dot:hover {
        background: var(--text-muted);
      }

      /* Directory tree */
      .dir-tree {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 13px;
        line-height: 1.8;
        color: #c9d1d9;
        margin: 14px 0 18px;
        white-space: pre;
        overflow-x: auto;
      }

      .dir-tree .comment {
        color: var(--text-muted);
      }

      /* Command explanations */
      .cmd-explain {
        margin-top: -10px;
        margin-bottom: 18px;
      }

      .cmd-explain-toggle {
        background: transparent;
        border: none;
        color: var(--accent);
        font-size: 12px;
        cursor: pointer;
        padding: 6px 0;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.15s;
      }

      .cmd-explain-toggle:hover {
        opacity: 0.8;
      }

      .cmd-explain-toggle::before {
        content: '▶';
        font-size: 10px;
        transition: transform 0.2s;
      }

      .cmd-explain-toggle.open::before {
        transform: rotate(90deg);
      }

      .cmd-explain-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        background: var(--surface);
        border-left: 3px solid var(--accent);
        border-radius: 4px;
      }

      .cmd-explain-content.open {
        max-height: 500px;
        padding: 12px 16px;
        margin-top: 8px;
      }

      .cmd-explain-content p {
        margin: 0 0 8px 0;
        font-size: 13px;
        line-height: 1.6;
      }

      .cmd-explain-content p:last-child {
        margin-bottom: 0;
      }

      .cmd-explain-content code {
        background: var(--code-bg);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-top">
        <h1 id="header-title">Droplet Setup Tutorial</h1>
        <span class="step-counter" id="step-counter">Step 1 of 18</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="content" id="step-content"></div>

    <div class="footer">
      <button class="nav-btn prev" id="prev-btn" onclick="navigate(-1)">Previous</button>
      <div class="step-dots" id="step-dots"></div>
      <button class="nav-btn next" id="next-btn" onclick="navigate(1)">Next</button>
    </div>

    <script>
      const TOTAL_STEPS = 19

      const state = {
        currentStep: 0,
        reservedIP: '',
        volumePath: '',
        githubUsername: '',
        domain: '',
        clientSubdomains: '',
        llmSubdomain: '',
        ...JSON.parse(localStorage.getItem('droplet-tutorial') || '{}')
      }

      function saveState() {
        localStorage.setItem('droplet-tutorial', JSON.stringify(state))
      }

      function v(key, placeholder) {
        const val = state[key]
        if (val && val.trim()) return `<span class="val">${esc(val.trim())}</span>`
        return `<span class="val empty">&lt;${placeholder}&gt;</span>`
      }

      function raw(key, placeholder) {
        const val = state[key]
        return val && val.trim() ? val.trim() : `<${placeholder}>`
      }

      function esc(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      }

      function getClients() {
        const val = state.clientSubdomains
        if (!val || !val.trim()) return ['client1', 'client2', 'client3']
        return val
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean)
      }

      function getDomain() {
        return state.domain && state.domain.trim() ? state.domain.trim() : 'domain.com.au'
      }

      function getLlm() {
        return state.llmSubdomain && state.llmSubdomain.trim() ? state.llmSubdomain.trim() : 'llm1'
      }

      function getIP() {
        return state.reservedIP && state.reservedIP.trim() ? state.reservedIP.trim() : '<YOUR_RESERVED_IP>'
      }

      function getGH() {
        return state.githubUsername && state.githubUsername.trim() ? state.githubUsername.trim() : 'your-username'
      }

      function getVolumePath() {
        return state.volumePath && state.volumePath.trim() ? state.volumePath.trim() : '/mnt/data'
      }

      function codeBlock(code, lang, explanation) {
        lang = lang || 'bash'
        const id = 'cb-' + Math.random().toString(36).slice(2, 9)
        const explainId = 'ex-' + Math.random().toString(36).slice(2, 9)
        let html = `<div class="code-block">
    <div class="code-block-header">
      <span>${lang}</span>
      <button class="copy-btn" onclick="copyCode('${id}', this)">Copy</button>
    </div>
    <pre id="${id}"><code>${code}</code></pre>
  </div>`
        if (explanation) {
          html += `<div class="cmd-explain">
    <button class="cmd-explain-toggle" onclick="toggleExplain('${explainId}', this)">
      What does this command do?
    </button>
    <div class="cmd-explain-content" id="${explainId}">
      ${explanation}
    </div>
  </div>`
        }
        return html
      }

      function copyCode(id, btn) {
        const el = document.getElementById(id)
        const text = el.textContent
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = 'Copied!'
          btn.classList.add('copied')
          setTimeout(() => {
            btn.textContent = 'Copy'
            btn.classList.remove('copied')
          }, 1500)
        })
      }

      function toggleExplain(id, btn) {
        const content = document.getElementById(id)
        const isOpen = content.classList.contains('open')
        if (isOpen) {
          content.classList.remove('open')
          btn.classList.remove('open')
        } else {
          content.classList.add('open')
          btn.classList.add('open')
        }
      }

      function inputField(key, label, placeholder, hint) {
        const val = state[key] || ''
        return `<div class="input-group">
    <label>${esc(label)}</label>
    <input type="text" value="${esc(val)}" placeholder="${esc(placeholder)}"
      oninput="state['${key}']=this.value; saveState();">
    ${hint ? `<div class="input-hint">${hint}</div>` : ''}
  </div>`
      }

      const steps = [
        // Step 1: Prerequisites
        () => ({
          title: 'Prerequisites',
          where: null,
          body: `
      <p>Before starting, make sure you have the following:</p>
      <ul>
        <li>A <strong>Digital Ocean</strong> account</li>
        <li>A <strong>Cloudflare</strong> account (free tier is fine)</li>
        <li>A domain registered via <strong>AWS</strong> (managed in Route53)</li>
        <li>Client site repos on <strong>GitHub</strong> (private, SSH access)</li>
      </ul>
      <h3>Architecture</h3>
      <div class="dir-tree">Route53 (NS &rarr; Cloudflare) &rarr; Cloudflare (proxy/DDOS) &rarr; DO Reserved IP &rarr; Caddy &rarr; Containers</div>
      <h3>Directory Structure on Droplet</h3>
      <div class="dir-tree">/srv/
├── caddy/
│   ├── docker-compose.yml
│   ├── Caddyfile
│   └── certs/
│       ├── origin.pem
│       └── origin-key.pem
├── sites/
│   ├── client1/              <span class="comment"># cloned from GitHub</span>
│   │   └── docker-compose.yml
│   ├── client2/
│   └── client3/
└── anythingllm/
    └── instance1/
        └── docker-compose.yml

<YOUR_VOLUME_PATH>/        <span class="comment"># DO attached volume (e.g., /mnt/volume_syd1_02)</span>
├── caddy/
└── anythingllm/
    └── instance1/</div>
      <p>Config and code live in <code>/srv/</code>. Persistent/generated data lives on the DO volume at <code>&lt;YOUR_VOLUME_PATH&gt;</code>.</p>
    `
        }),

        // Step 2: Create Droplet & Reserved IP
        () => ({
          title: 'Create Droplet & Reserved IP',
          where: 'Digital Ocean Dashboard',
          body: `
      <ol>
        <li>Create a Droplet using the <strong>Docker</strong> image from the DO Marketplace
          <ul>
            <li>Choose your preferred region and size (recommend at least <strong>4GB RAM</strong> to start, given AnythingLLM)</li>
            <li>Under <strong>Add Volume</strong>, create a volume &mdash; DO will automatically format and mount it (typically at <code>/mnt/&lt;volume-name&gt;</code>) and add the fstab entry</li>
          </ul>
        </li>
        <li>Go to <strong>Networking &rarr; Reserved IPs</strong> and create a reserved IP, assign it to your droplet</li>
      </ol>
      <h3>Enter Your Reserved IP</h3>
      <p>Once you have your reserved IP, enter it below. It will be used throughout the rest of the tutorial.</p>
      ${inputField('reservedIP', 'Reserved IP Address', '164.90.xxx.xxx', 'Your Digital Ocean reserved IP address')}
    `
        }),

        // Step 3: SSH & Verify Volume
        () => ({
          title: 'SSH & Verify Volume',
          where: 'Your Local Terminal',
          body: `
      <p>SSH into the droplet from your local machine:</p>
      ${codeBlock(`ssh root@${raw('reservedIP', 'YOUR_RESERVED_IP')}`, 'bash', `<p><code>ssh</code> establishes a secure shell connection to the remote server.</p><p><code>root@...</code> specifies connecting as the root user to the IP address.</p>`)}
      <h3>Find Your Volume Mount Path</h3>
      <p>The volume was attached during droplet creation, so it should already be mounted. Run this to see all mounted filesystems:</p>
      ${codeBlock('df -h', 'bash', `<p><code>df</code> reports filesystem disk space usage.</p><p><code>-h</code> shows sizes in human-readable format (GB, MB instead of bytes).</p>`)}
      <p>Look for your volume (it will be the largest disk that's not the root filesystem). It will be mounted at a path like <code>/mnt/volume_syd1_02</code> or <code>/mnt/data-volume</code>.</p>
      <h3>Enter Your Volume Path</h3>
      <p>Enter the full mount path of your volume below. This will be used throughout the rest of the tutorial.</p>
      ${inputField('volumePath', 'Volume Mount Path', '/mnt/volume_syd1_02', 'The full path where your DO volume is mounted (e.g., /mnt/volume_syd1_02)')}
      <p>To verify it's correct, run:</p>
      ${codeBlock(`df -h ${getVolumePath()}`, 'bash', `<p><code>df -h</code> with a specific path shows disk usage information for just that filesystem.</p><p>This confirms your volume is mounted at the path you entered.</p>`)}
      <p>You should see your volume listed with the correct size.</p>
    `
        }),

        // Step 4: Create Directory Structure
        () => ({
          title: 'Create Directory Structure',
          where: 'Droplet (SSH)',
          body: `
      <p>On the droplet (as root, in any directory). These commands use absolute paths so your current directory doesn't matter:</p>
      ${codeBlock(`# App directories
mkdir -p /srv/caddy/certs
mkdir -p /srv/sites
mkdir -p /srv/anythingllm/instance1

# Persistent data directories on the volume
mkdir -p ${getVolumePath()}/caddy
mkdir -p ${getVolumePath()}/anythingllm/instance1

# AnythingLLM runs as UID 1000 inside the container
chown -R 1000:1000 ${getVolumePath()}/anythingllm/instance1`, 'bash', `<p><code>mkdir</code> creates directories.</p><p><code>-p</code> creates parent directories as needed and doesn't error if directories already exist.</p><p><code>chown -R 1000:1000</code> sets ownership of the AnythingLLM data directory to UID 1000 (the user that AnythingLLM runs as inside the container). Without this, the container cannot write its SQLite database to the mounted volume.</p><p>Lines starting with <code>#</code> are comments for clarity.</p>`)}
      <h3>Verify Directory Creation</h3>
      <p>Confirm the directories were created successfully:</p>
      ${codeBlock(`# Check /srv directories
ls -la /srv

# Check volume directories
ls -la ${getVolumePath()}`, 'bash', `<p><code>ls -la</code> lists directory contents with details.</p><p><code>-l</code> shows long format with permissions and dates.</p><p><code>-a</code> shows all files including hidden ones (names starting with .).</p><p>You should see the directories you just created listed in the output.</p>`)}
    `
        }),

        // Step 5: Set Up GitHub SSH Key
        () => ({
          title: 'Set Up GitHub SSH Key',
          where: 'Droplet (SSH)',
          body: `
      <p>Generate a deploy key on the droplet so it can clone your private repos:</p>
      ${codeBlock(`ssh-keygen -t ed25519 -C "droplet-deploy" -f ~/.ssh/id_ed25519 -N ""
cat ~/.ssh/id_ed25519.pub`, 'bash', `<p><code>ssh-keygen</code> generates SSH key pairs for authentication.</p><p><code>-t ed25519</code> specifies the Ed25519 key type (modern, secure).</p><p><code>-C "droplet-deploy"</code> adds a comment to identify this key.</p><p><code>-f ~/.ssh/id_ed25519</code> sets the output file path.</p><p><code>-N ""</code> creates a key with no passphrase (empty string).</p><p><code>cat</code> displays the public key file contents for copying.</p>`)}
      <p>Copy the public key output. In GitHub, go to <strong>Settings &rarr; SSH and GPG keys &rarr; New SSH key</strong> and paste it.</p>
      <p>Test the connection:</p>
      ${codeBlock('ssh -T git@github.com', 'bash', `<p><code>ssh -T</code> tests SSH connection without requesting a terminal.</p><p><code>git@github.com</code> connects to GitHub's SSH server to verify authentication.</p>`)}
      <p>You should see: <em>"Hi username! You've successfully authenticated..."</em></p>
      <h3>Enter Your GitHub Username</h3>
      <p>This will be used in git clone commands later.</p>
      ${inputField('githubUsername', 'GitHub Username', 'your-username', 'Your GitHub username for clone URLs')}
    `
        }),

        // Step 6: Create Docker Network
        () => ({
          title: 'Create Docker Network',
          where: 'Droplet (SSH)',
          body: `
      <p>Create the shared Docker network that all containers will use to communicate:</p>
      ${codeBlock('docker network create caddy-net', 'bash', `<p><code>docker network create</code> creates a new Docker network.</p><p><code>caddy-net</code> is the name of the network. All containers will connect to this shared network to communicate with each other.</p>`)}
      <p>All docker-compose files will reference this as an <code>external</code> network. Since it's created manually, there's no boot-order dependency between containers.</p>
    `
        }),

        // Step 7: Add Domain to Cloudflare
        () => ({
          title: 'Add Domain to Cloudflare',
          where: 'Cloudflare Dashboard',
          body: `
      <h3>Enter Your Domain</h3>
      <p>Enter the domain you'll be using. This will be referenced throughout the remaining steps.</p>
      ${inputField('domain', 'Domain', 'pixeldemos.com.au', 'Your full domain (e.g., pixeldemos.com.au)')}

        counter.textContent = `Step ${state.currentStep + 1} of ${TOTAL_STEPS}`
        title.textContent = step.title
        fill.style.width = `${((state.currentStep + 1) / TOTAL_STEPS) * 100}%`

        let html = `<h2 class="step-title">${step.title}</h2>`
        if (step.where) html += `<div class="step-where">${step.where}</div>`
        html += `<div class="step-body">${step.body}</div>`
        container.innerHTML = html

        prevBtn.disabled = state.currentStep === 0
        nextBtn.textContent = state.currentStep === TOTAL_STEPS - 1 ? 'Done' : 'Next'

        renderDots()
        container.scrollTop = 0
        window.scrollTo(0, 0)
      }

      function renderDots() {
        const dotsEl = document.getElementById('step-dots')
        let html = ''
        for (let i = 0; i < TOTAL_STEPS; i++) {
          let cls = 'step-dot'
          if (i === state.currentStep) cls += ' active'
          html += `<div class="${cls}" onclick="goToStep(${i})" title="Step ${i + 1}"></div>`
        }
        dotsEl.innerHTML = html
      }

      function navigate(dir) {
        const next = state.currentStep + dir
        if (next < 0 || next >= TOTAL_STEPS) return
        state.currentStep = next
        saveState()
        render()
      }

      function goToStep(i) {
        state.currentStep = i
        saveState()
        render()
      }

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault()
          navigate(1)
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault()
          navigate(-1)
        }
      })

      render()
    </script>
  </body>
</html>
